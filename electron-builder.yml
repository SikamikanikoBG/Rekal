appId: com.rekal.app
productName: Rekal
copyright: Copyright (c) 2026 Rekal Contributors

directories:
  output: release
  buildResources: resources

files:
  - dist/**/*
  - resources/**/*
  - whisper-sidecar/**/*
  - package.json

# Include native modules (better-sqlite3)
asar: true
asarUnpack:
  - "node_modules/better-sqlite3/**/*"

win:
  target:
    - target: nsis
      arch: [x64]
    - target: portable
      arch: [x64]
  icon: resources/icons/icon.png
  publisherName: Rekal
  signAndEditExecutable: false

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: Rekal
  artifactName: Rekal-Setup-${version}.${ext}
  deleteAppDataOnUninstall: false

portable:
  artifactName: Rekal-Portable-${version}.${ext}

extraResources:
  - from: whisper-sidecar
    to: whisper-sidecar
  - from: resources/private.pem
    to: private.pem

publish:
  provider: github
  releaseType: release
